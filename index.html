<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>NID Generator Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.generate { background:#28a745;color:white; }
.download { background:#007bff;color:white; }
.clear { background:#dc3545;color:white; }

canvas {
  width: 100%;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#sigCanvas {
  border: 2px dashed #aaa;
  background: #fff;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>NID Generator Ultimate 🔥</h2>

<input id="nameBn" placeholder="বাংলা নাম">
<input id="nameEn" placeholder="English Name">
<input id="dob" type="date">
<input id="nid" placeholder="NID Number">
<input type="file" id="photo">

<h4>✍️ Signature Draw</h4>
<canvas id="sigCanvas" width="300" height="100"></canvas><br>
<button class="clear" onclick="clearSig()">Clear Signature</button>

<div style="text-align:center;">
<button class="generate" onclick="generate()">Generate</button>
<button class="download" onclick="download()">Download</button>
</div>

<canvas id="canvas" width="900" height="500"></canvas>

</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let bg = new Image();
bg.src = "nid.png";

bg.onload = draw;

function formatDate(date) {
  let d = new Date(date);
  return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
}

function draw() {
  ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  let nameBn = document.getElementById("nameBn").value;
  let nameEn = document.getElementById("nameEn").value;
  let dob = formatDate(document.getElementById("dob").value);
  let nid = document.getElementById("nid").value;

  ctx.fillStyle = "#111";

  ctx.font = "22px 'Noto Sans Bengali'";
  ctx.fillText(nameBn, 300, 190);

  ctx.font = "20px Arial";
  ctx.fillText(nameEn, 300, 225);

  ctx.fillText(dob, 300, 335);

  ctx.font = "bold 22px Arial";
  ctx.fillText(nid, 300, 370);
}

function generate() {
  draw();

  let file = document.getElementById("photo").files[0];
  if (file) {
    let reader = new FileReader();
    reader.onload = function(e) {
      let img = new Image();
      img.onload = function() {

        let size = Math.min(img.width, img.height);
        let sx = (img.width - size)/2;
        let sy = (img.height - size)/2;

        ctx.drawImage(img, sx, sy, size, size, 70, 160, 140, 140);

        let sig = document.getElementById("sigCanvas");
        ctx.drawImage(sig, 550, 400, 200, 50);
      }
      img.src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}

function download() {
  let link = document.createElement("a");
  link.download = "nid.png";
  link.href = canvas.toDataURL();
  link.click();
}

// Signature draw
let sigCanvas = document.getElementById("sigCanvas");
let sctx = sigCanvas.getContext("2d");

let drawing = false;

sigCanvas.addEventListener("mousedown", () => drawing = true);
sigCanvas.addEventListener("mouseup", () => {
  drawing = false;
  sctx.beginPath();
});
sigCanvas.addEventListener("mousemove", drawSig);

function drawSig(e) {
  if (!drawing) return;
  sctx.lineWidth = 2;
  sctx.lineCap = "round";

  sctx.lineTo(e.offsetX, e.offsetY);
  sctx.stroke();
  sctx.beginPath();
  sctx.moveTo(e.offsetX, e.offsetY);
}

function clearSig() {
  sctx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
}

// Live preview
document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", draw);
});
</script>

</body>
</html>
