<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাদেশ NID কার্ড ফিলার</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h1 { text-align: center; color: #c8102e; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 17px; box-sizing: border-box; }
        button { padding: 16px 32px; font-size: 18px; margin: 8px 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .generate-btn { background: #c8102e; color: white; }
        .download-btn { background: #006600; color: white; }
        .preview { margin: 30px 0; text-align: center; border: 4px solid #ddd; border-radius: 15px; overflow: hidden; background: #f9f9f9; }
        canvas { max-width: 100%; height: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.25); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇧🇩 বাংলাদেশ জাতীয় পরিচয় পত্র ফিলার</h1>
        
        <div class="form-group">
            <label>বাংলা নাম:</label>
            <input type="text" id="banglaName" value="মোঃ যুনাইদ খান">
        </div>
        <div class="form-group">
            <label>ইংরেজি নাম:</label>
            <input type="text" id="englishName" value="MD. JUNAID KHAN">
        </div>
        <div class="form-group">
            <label>জন্ম তারিখ (Date of Birth):</label>
            <input type="text" id="dob" value="24 Sep 2006">
        </div>
        <div class="form-group">
            <label>এনআইডি নম্বর (ID NO):</label>
            <input type="text" id="nid" value="8724907137">
        </div>

        <center>
            <button class="generate-btn" onclick="generateCard()">✅ Generate Card</button>
            <button class="download-btn" onclick="downloadCard()">⬇️ Download PNG</button>
        </center>

        <div class="preview">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let template = new Image();

        template.src = './blank_nid.jpg';   // ছবির নাম ঠিক রাখো (ছোট হাতের)

        template.onload = () => {
            canvas.width = template.width;
            canvas.height = template.height;
            generateCard();
        };

        template.onerror = () => {
            alert("blank_nid.jpg পাওয়া যায়নি! ছবিটা রেপোতে আছে কিনা চেক করো।");
        };

        function generateCard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(template, 0, 0);

            const bangla = document.getElementById('banglaName').value;
            const english = document.getElementById('englishName').value;
            const dob = document.getElementById('dob').value;
            const nid = document.getElementById('nid').value;

            // বাংলা ফন্ট (ওয়েবে সবচেয়ে ভালো কাজ করে)
            ctx.font = 'bold 29px "Noto Sans Bengali", Arial, sans-serif';
            ctx.fillStyle = '#000000';
            ctx.fillText(bangla, 255, 148);
            ctx.fillText(english, 255, 188);

            ctx.font = 'bold 29px Arial Black';
            ctx.fillStyle = '#ff0000';
            ctx.fillText(dob, 255, 355);
            ctx.fillText(nid, 255, 392);
        }

        function downloadCard() {
            const link = document.createElement('a');
            link.download = `NID_${document.getElementById('nid').value}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // এন্টার চাপলে জেনারেট হবে
        document.addEventListener('keypress', e => { if (e.key === 'Enter') generateCard(); });
    </script>
</body>
</html>
